<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #fff3b0, #d7f9ff);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #333;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 650px;
      width: 100%;
      padding: 30px;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      animation: popIn 0.5s ease;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.5;
    }

    img, video {
      max-width: 100%;
      max-height: 520px;
      border-radius: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      object-fit: contain;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      background: #ff6fae;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: scale(1.06);
      background: #ff4d9d;
    }

    .small-note {
      font-size: 0.9rem;
      color: #666;
      margin-top: 15px;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }

    .confetti {
      position: fixed;
      top: -10px;
      font-size: 24px;
      animation: fall 3s linear infinite;
      pointer-events: none;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>🎂 A Birthday Surprise</h1>
    <p>Before your birthday message appears, you have to pass a very serious friendship quiz...</p>
    <div class="buttons">
      <button onclick="showStep(0)">I accept the challenge 💖</button>
    </div>
  </div>

  <script>
    const steps = [
      {
        question: "Question 1: Do you know how loved you are today?",
        text: "Careful... this one has only one correct answer.",
        media: "happy.jpg",
        answers: [
          { label: "Yes, obviously 😌", next: 1 },
          { label: "Maybe?", next: 1 }
        ]
      },
      {
        question: "Correct answer: VERY loved 💕",
        text: "Memory unlocked: this moment always makes me smile.",
        media: "soulsisters.jpg",
        answers: [
          { label: "Awww, next memory 🥹", next: 2 },
          { label: "I want more love", next: 2 }
        ]
      },
      {
        question: "Question 2: What is your superpower?",
        text: "Choose wisely. Your birthday destiny depends on it.",
        media: "colorful.jpg",
        answers: [
          { label: "Making everyone laugh 😂", next: 3 },
          { label: "Being iconic ✨", next: 3 },
          { label: "Shinning bright 🍰", next: 3 }
        ]
      },
      {
        question: "Memory unlocked: pure iconic energy ✨",
        text: "This photo deserves a permanent place in the friendship museum.",
        media: "sisterly.jpg",
        answers: [
          { label: "Unlock more memories 🔐", next: 4 }
        ]
      },
      {
        question: "Question 3: What is our favorite activity?",
        text: "There is technically no wrong answer, but one answer is very correct.",
        media: "karaoke.jpg",
        answers: [
          { label: "Long Car Rides", next: 5 },
          { label: "Car Karaoke", next: 5 },
          { label: "Car Karaoke and Long Car Rides", next: 5 }
        ]
      },
      {
        question: "Correct: Car Karaoke and Long Car Rides",
        text: "Another memory unlocked because honestly... this one is unforgettable and where it all started.",
        media: "soulsisters.jpg",
        answers: [
          { label: "Next memory 🥹", next: 6 }
        ]
      },
      {
        question: "Memory unlocked 💖",
        text: "From a little island walk...",
        media: "littleisland.jpg",
        answers: [{ label: "Next 💕", next: 7 }]
      },
      { question: "Memory unlocked ✨", text: "to the epic Break Bar selfies", media: "beerbar.jpg", answers: [{ label: "Next 💕", next: 8 }] },
      { question: "Memory unlocked 🎈", text: "to celebrating special days of our lives", media: "birthdays.jpg", answers: [{ label: "Next 💕", next: 9 }] },
      { question: "Memory unlocked 🥳", text: "to celebrating New Years", media: "celebrating.jpg", answers: [{ label: "Next 💕", next: 10 }] },
      { question: "Memory unlocked 🌈", text: "to happy moments just because ", media: "colorful.jpg", answers: [{ label: "Next 💕", next: 11 }] },
      { question: "Memory unlocked 🎨", text: "to creating art", media: "creating.jpg", answers: [{ label: "Next 💕", next: 12 }] },
      { question: "Memory unlocked 💗", text: "to just being certified cuties, obviously", media: "cuties.jpg", answers: [{ label: "Next 💕", next: 13 }] },
      { question: "Memory unlocked 🎞️", text: "to being Day-1 energy forever", media: "day1.gif", answers: [{ label: "Next 💕", next: 14 }] },
      { question: "Memory unlocked 🏙️", text: "to fancy rooftops", media: "fancyrooftop.jpg", answers: [{ label: "Next 💕", next: 15 }] },
      { question: "Memory unlocked 🎡", text: "to festivals and adventures", media: "festivals.jpg", answers: [{ label: "Next 💕", next: 16 }] },
      { question: "Memory unlocked 🔥", text: "to fire-matching energy", media: "firematch.jpg", answers: [{ label: "Next 💕", next: 17 }] },
      { question: "Memory unlocked 🖤", text: "to Gatsby-level iconic", media: "gatsby.jpg", answers: [{ label: "Next 💕", next: 18 }] },
      { question: "Memory unlocked 🎶", text: "to goth concerts", media: "gothconcerts.jpg", answers: [{ label: "Next 💕", next: 19 }] },
      { question: "Memory unlocked 😊", text: "to just being us", media: "happy.jpg", answers: [{ label: "Next 💕", next: 20 }] },
      { question: "Memory unlocked 🏡", text: "to rooftops of NYC", media: "home.jpg", answers: [{ label: "Next 💕", next: 21 }] },
      { question: "Memory unlocked 🚗", text: "to long car rides, endless talks, and forever memories", media: "longcarride.jpg", answers: [{ label: "Next 💕", next: 22 }] },
      { question: "Memory unlocked 🌸", text: "to park selfies because why not?", media: "parkselfie.jpg", answers: [{ label: "Next 💕", next: 23 }] },
      { question: "Memory unlocked 🎱", text: "to playing pool and letting you win (or maybe the other way around)", media: "playpool.jpg", answers: [{ label: "Next 💕", next: 24 }] },
      { question: "Memory unlocked 🌃", text: "to attending events where we still ended up just enjoying our own conversations", media: "rooftopevent.jpg", answers: [{ label: "Next 💕", next: 25 }] },
      { question: "Memory unlocked 🗽", text: "to making NYC memories together", media: "rooftopnyc.jpg", answers: [{ label: "Next 💕", next: 26 }] },
      { question: "Memory unlocked 👯‍♀️", text: "to always being by each others side like sisters", media: "sisterly.jpg", answers: [{ label: "Next 💕", next: 27 }] },
      { question: "Memory unlocked 🚶‍♀️", text: "to simple strolls that fill our hearts", media: "strolling.jpg", answers: [{ label: "Next 💕", next: 28 }] },
      { question: "Memory unlocked 🌿", text: "to perfect summer hikes and sunshine moments", media: "summerhike.jpg", answers: [{ label: "Next 💕", next: 29 }] },
      { question: "Memory unlocked 🎵", text: "to summer music and friendship magic", media: "summermusic.jpg", answers: [{ label: "Next 💕", next: 30 }] },
      {
        question: "Final Question: How much do I love you?",
        text: "This is the easiest question of the whole game.",
        media: "valentine.jpg",
        answers: [
          { label: "A lot", next: 31 },
          { label: "Too much", next: 31 },
          { label: "Pafund!!! ♾️", next: 31 }
        ]
      },
      {
        question: "Correct answer: PAFUND!!! 💖",
        text: "One last memory before your birthday message.",
        media: "thanksgiving.jpg",
        answers: [{ label: "Open the final birthday message 🎁", next: 32 }]
      },
      {
        question: "Happy Birthday my Dearest Egla 🎉",
        text: "I hope this year brings you love, joy, peace, laughter, beautiful surprises, and everything your heart has been waiting for. I am so grateful for you and all the memories we have shared and continue to share. Here’s to many more adventures, deep talks, silly moments, and unforgettable memories together. I love you! 💖",
        media: "sisterly.jpg",
        answers: [
          { label: "Replay from the beginning 🔁", next: "start" }
        ]
      }
    ];

    function showStep(index) {
      if (index === "start") {
        location.reload();
        return;
      }

      const step = steps[index];
      const card = document.getElementById("card");

      let mediaHTML = "";
      if (step.media.endsWith(".mp4")) {
        mediaHTML = `<video controls><source src="${step.media}" type="video/mp4">Your browser does not support video.</video>`;
      } else {
        mediaHTML = `<img src="${step.media}" alt="Birthday memory" />`;
      }

      card.innerHTML = `
        <h1>${step.question}</h1>
        <p>${step.text}</p>
        ${mediaHTML}
        <div class="buttons">
          ${step.answers.map(answer => `
            <button onclick="showStep('${answer.next}')">${answer.label}</button>
          `).join("")}
        </div>
        <p class="small-note">Memory ${Number(index) + 1} of ${steps.length}</p>
      `;

      card.style.animation = "none";
      setTimeout(() => {
        card.style.animation = "popIn 0.5s ease";
      }, 10);

      launchConfetti();
    }

    function launchConfetti() {
      const emojis = ["🎉", "💖", "✨", "🎂", "🥳", "💕"];
      for (let i = 0; i < 20; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDuration = 2 + Math.random() * 2 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4000);
      }
    }
  </script>
</body>
</html>
